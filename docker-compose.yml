services:

  # ── SQL Server ─────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # Wait until SQL Server accepts connections before letting the API start
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── .NET API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./HrPayroll.Api
    restart: unless-stopped
    ports:
      - "7171:5050"
    environment:
      ASPNETCORE_URLS: http://+:5050
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HrPayrollDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: HrPayrollApi
      Jwt__Audience: HrPayrollClient
      Jwt__ExpiryHours: 8
    depends_on:
      sqlserver:
        condition: service_healthy

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./hr-payroll-client
    restart: unless-stopped
    ports:
      - "3344:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
